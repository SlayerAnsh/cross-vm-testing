# Config-driven run definitions for the DeFi vault harness (`cross-vm-tests`).
#
# Run with, e.g.:
#   cargo run -p cross-vm-tests --bin cross-vm -- validate examples/cross-vm-tests/vault.cross-vm.toml
#   cargo run -p cross-vm-tests --bin cross-vm -- run examples/cross-vm-tests/vault.cross-vm.toml --profile smoke
#
# The three [[chain]] declarations below mirror today's hard coded OSMOSIS / ETHEREUM /
# SOLANA_DEVNET presets (crates/cosmwasm/src/chains/presets.rs, crates/solidity/src/chains/presets.rs,
# crates/solana/src/chains/presets.rs); labels osmosis/eth/solana match vault_setup's LABELS
# exactly, so a mock run against this config exercises the identical topology.

[harness]
name = "vault"

[[chain]]
label = "osmosis"
kind = "cosmwasm"
chain_id = "osmosis-1"
name = "Osmosis"
bech32_prefix = "osmo"
native_denom = "uosmo"
native_symbol = "OSMO"
gas_price = 0.025
rpc_url = "https://rpc.osmosis.zone:443"

# No rpc_url declared: every profile in this file targets mock (see [env] and [defaults] below),
# so none needs one. A `--target-chain eth=rpc` override therefore hits the framework's
# "rpc target requires rpc_url" validation cleanly (exit code 3), never an actual network call;
# a real deployment config would add `rpc_url = "${ETH_RPC:-https://eth.llamarpc.com}"` here.
[[chain]]
label = "eth"
kind = "evm"
chain_id = "1"
name = "Ethereum"
native_symbol = "ETH"
spec_id = "cancun"

[[chain]]
label = "solana"
kind = "svm"
chain_id = "devnet"
name = "Solana Devnet"
native_symbol = "SOL"
commitment = "finalized"
rpc_url = "https://api.devnet.solana.com"
ws_url = "wss://api.devnet.solana.com"

[env]
target = "mock"
chains = ["osmosis", "eth", "solana"]

[defaults]
seed = 42
check_every = 1

# A fast, CI-friendly smoke profile: few cases, few ops per case, restricted to the two simplest
# op kinds.
[profile.smoke]
mode = "fuzz"
cases = 8
ops = 20
kinds = ["deposit", "withdraw"]

# A deeper fuzz profile over the full op mix, weighted toward deposits.
[profile.deep]
mode = "fuzz"
cases = 200
ops = 50
weights = { deposit = 40, withdraw = 25, borrow = 20, repay = 15 }

# A single long invariant run, checked every 5 ops.
[profile.invariant-long]
mode = "invariant"
ops = 2000
check_every = 5

# Demonstrates the approved per-chain `env.targets` override (spec section 6.2): every chain
# still defaults to mock (`[env].target`), but `osmosis` (which declares a real `rpc_url`) is
# promoted to a live RPC target for this profile only, while `eth` and `solana` stay mock. Not
# run by any make target or e2e test (it would need a funded live wallet); it exists purely as a
# documented example of the mixed mock/rpc shape a deployment or canary profile would use.
[profile.mixed-targets]
mode = "fuzz"
cases = 4
ops = 10
kinds = ["deposit", "withdraw"]
env = { targets = { osmosis = "rpc" } }

# Scenario mode demo (spec section 6.3): a concrete, ordered step sequence with per-step
# expectations. Deposits 1_000 of collateral, then attempts to withdraw 5_000 (more than
# deposited), which the vault's collateral model must reject.
[profile.deposit-then-overdraw]
mode = "scenario"

  [[profile.deposit-then-overdraw.steps]]
  op = { deposit = { chain = "osmosis", user = 0, amount = 1000 } }
  expect = "accepted"

  [[profile.deposit-then-overdraw.steps]]
  op = { withdraw = { chain = "osmosis", user = 0, amount = 5000 } }
  expect = "rejected"

# Progressive pipeline (dependency gated phases with world handoff): prove deposits
# work first, then drive the riskier mix against the state the deposit phase built,
# never re-paying the deposit work. A failing first phase skips the second.
[profile.deposit-soak]
mode = "invariant"
ops = 200
kinds = ["deposit"]

[profile.mixed-after-deposits]
mode = "invariant"
ops = 150
weights = { withdraw = 40, borrow = 30, repay = 30 }

[suite.progressive]

  [[suite.progressive.phases]]
  profile = "deposit-soak"

  [[suite.progressive.phases]]
  profile = "mixed-after-deposits"
  needs = ["deposit-soak"]
  world = "inherit"

# Staged pipeline mixing modes: fixed scenario scripts seed liquidity, a long random
# mix runs against that state, then a deep single case fuzz digs further, each phase
# starting where the previous one stopped.
[profile.seed-liquidity]
mode = "scenario"
steps = [
  { op = { deposit = { chain = "eth", user = 0, amount = 500000 } } },
  { op = { deposit = { chain = "osmosis", user = 1, amount = 300000 } } },
  { op = { borrow = { chain = "eth", user = 0, amount = 100000 } } },
]

[profile.random-mix]
mode = "invariant"
ops = 200

[profile.deep-case]
mode = "fuzz"
cases = 1
ops = 60

[suite.staged]

  [[suite.staged.phases]]
  profile = "seed-liquidity"

  [[suite.staged.phases]]
  profile = "random-mix"
  needs = ["seed-liquidity"]
  world = "inherit"

  [[suite.staged.phases]]
  profile = "deep-case"
  needs = ["random-mix"]
  world = "inherit"
