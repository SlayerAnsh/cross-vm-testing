[harness]
name = "math"

[env]
buggy = false

[defaults]
seed = 42
check_every = 1

[profile.smoke]
mode = "fuzz"
cases = 4
ops = 20

[profile.invariants]
mode = "invariant"
ops = 200

[profile.steps]
mode = "scenario"

  [[profile.steps.steps]]
  op = { add = { n = 5 } }

  [[profile.steps.steps]]
  op = { add = { n = -3 } }

[suite.all]
profiles = ["smoke", "invariants", "steps"]
stop_on_failure = false
