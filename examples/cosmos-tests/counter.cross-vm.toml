# Config-driven run definitions for the single-VM (CosmWasm) counter harness (`cosmos-tests`).
#
# Run with, e.g.:
#   cargo run -p cosmos-tests --bin cross-vm -- validate examples/cosmos-tests/counter.cross-vm.toml
#   cargo run -p cosmos-tests --bin cross-vm -- run examples/cosmos-tests/counter.cross-vm.toml --profile smoke

[harness]
name = "counter"

[[chain]]
label = "osmosis"
kind = "cosmwasm"
chain_id = "osmosis-1"
name = "Osmosis"
bech32_prefix = "osmo"
native_denom = "uosmo"
native_symbol = "OSMO"
gas_price = 0.025
rpc_url = "https://rpc.osmosis.zone:443"

[env]
target = "mock"
chains = ["osmosis"]

[defaults]
seed = 42
check_every = 1

# A fast, CI-friendly smoke profile: a few short fuzz cases over both op kinds.
[profile.smoke]
mode = "fuzz"
cases = 4
ops = 20
kinds = ["Increment", "IncrementTwice"]

# A single longer invariant run, checked every 5 ops.
[profile.invariant-long]
mode = "invariant"
ops = 200
check_every = 5

# Scenario mode: a concrete, ordered step sequence. Both increments are always accepted.
[profile.steps]
mode = "scenario"

  [[profile.steps.steps]]
  op = "Increment"
  expect = "accepted"

  [[profile.steps.steps]]
  op = "IncrementTwice"
  expect = "accepted"
