# cargo-deny configuration: advisories, license allowlist, duplicate-version and
# source hygiene for the whole workspace. Run locally with `cargo deny check`;
# CI runs it on every PR.

[graph]
all-features = true

[advisories]
yanked = "deny"
# Only flag unmaintained crates the workspace depends on DIRECTLY. The solana /
# cosmos / alloy trees carry several unmaintained transitive deps (ansi_term,
# bincode, derivative, libsecp256k1, paste, proc-macro-error2, rustls-pemfile)
# that only their upstreams can swap out; failing CI on them is pure noise.
unmaintained = "workspace"
ignore = [
    # rustls-webpki 0.101 certificate-validation flaws, reached only through
    # cosmrs 0.21 -> tendermint-rpc -> reqwest 0.11 -> rustls 0.21. The pinned
    # cosmrs major (see DEVELOPER.md dependency rationale) has no release on
    # reqwest 0.12 / rustls 0.23 yet, and no patched 0.101.x exists. Affects the
    # live cosmos RPC path only (TLS cert checks); the default mock suite makes
    # no network calls. Revisit when bumping cosmrs.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
    # bincode 1.3.3 unmaintained (team ceased development and declared 1.3.3
    # complete). It is a direct dep of cross-vm-solana because Solana's
    # transaction wire format IS bincode-1 encoding: `sign_transaction` must
    # emit those exact bytes, so the suggested alternatives (postcard, rkyv,
    # ...) would produce wrong output by construction. The whole solana
    # dependency tree already carries this same crate transitively.
    "RUSTSEC-2025-0141",
]

[licenses]
# Additions need a conscious decision, not a silent pass: extend this list in the
# PR that introduces the dependency.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "Unlicense",
    "0BSD",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

# ring bundles code under ISC/MIT/OpenSSL-style terms without a SPDX expression
# cargo-deny can infer; the standard clarification below is the cargo-deny wiki's.
[[licenses.clarify]]
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# The crypto dep trees (alloy, solana, revm, cosmrs) legitimately carry duplicate
# minor versions; warn (visible in CI logs) rather than fail.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
