name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustflags: "" so the global default of -D warnings is not applied to every cargo
      # invocation. We enforce -D warnings explicitly on clippy below; the third-party Solana
      # program build (cargo build-sbf) emits deprecation warnings we do not control.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      # ----- Cheap, artifact-free checks first, so a trivial failure does not pay for the
      #       Foundry / Solana toolchain installs below. -----
      - name: cargo fmt
        run: cargo fmt --all --check
      # No --all-targets: the test targets embed gitignored contract artifacts that only exist
      # after the compile steps below. Lib/bin clippy stays artifact-free.
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: cargo doc
        run: cargo doc --workspace --no-deps
      - name: cargo build
        run: cargo build --workspace

      # ----- Toolchains for the contract artifacts the integration tests embed. -----
      - uses: foundry-rs/foundry-toolchain@v1
      - name: forge fmt
        working-directory: examples/solidity-contracts
        run: forge fmt --check
      # Solana (Agave) platform tools from Anza; the legacy release.solana.com host is flaky.
      # This provides cargo-build-sbf, which builds the program .so directly (no Anchor CLI: it
      # added an anchor-cli/anchor-lang version handshake that silently produced no .so).
      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          "$HOME/.local/share/solana/install/active_release/bin/solana" --version

      # ----- Build the embedded artifacts once, then reuse across the test steps below. -----
      # EVM: out/*.json consumed by sol! (test contracts skipped, they need forge-std).
      # Solana: target/deploy/*.so consumed by include_bytes!.
      # CosmWasm needs no artifact here: the cross-VM tests wrap the example contracts in-process
      # via cw-multi-test ContractWrapper (native rlib), not compiled wasm.
      - name: Compile Solidity artifacts
        run: make compile-solidity
      - name: Compile Solana artifacts
        run: |
          make compile-solana
          # Fail loudly if the .so are missing (a build that no-ops would otherwise pass here
          # and only fail later at the include_bytes! in the test compile).
          for so in counter ping_pong vault; do
            test -f "examples/solana-contracts/target/deploy/$so.so" \
              || { echo "missing $so.so after compile-solana"; exit 1; }
          done

      # ----- Tests. One target dir, reused; the artifacts above are already built. -----
      # Everything except cross-vm-cosmwasm, whose tests/onchain.rs embeds a compiled
      # counter.wasm built only by the Docker CosmWasm optimizer (not available in CI). That is
      # a live #[ignore] test; the cross-VM cosmwasm path is still covered via ContractWrapper.
      - name: Test (workspace except cosmwasm)
        run: cargo test --workspace --exclude cross-vm-cosmwasm
      # cross-vm-cosmwasm minus the wasm-embedding onchain.rs target.
      - name: Test (cosmwasm, artifact-free targets)
        run: cargo test -p cross-vm-cosmwasm --lib --test counter --test vault --test typed_handle
