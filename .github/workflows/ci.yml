name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Incremental compilation bloats the cache without helping a cold CI runner.
  CARGO_INCREMENTAL: 0
  # Single source of truth for the pinned Agave toolchain (install URL + caches).
  # Its platform-tools Cargo must keep parsing the committed solana-contracts
  # lockfile; see the comment on the Install Solana step before bumping.
  SOLANA_VERSION: v4.0.0
  # Keep in step with [workspace.package] rust-version in Cargo.toml.
  MSRV: "1.91"

jobs:
  # ---------------------------------------------------------------------------
  # Lint: fmt + clippy + doc. Shares the main rust-cache with `test` so the
  # dependency graph compiles once and restores everywhere. No contract
  # artifacts are needed: clippy stays artifact-free (no --all-targets, so it
  # never compiles the test binaries that embed the .so/.json). No standalone
  # `cargo build --workspace` here: `test` compiles the whole workspace anyway,
  # and clippy already surfaces build errors, so a build step would just be a
  # duplicate compile burning runner-minutes.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (fmt / clippy / doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # rustflags: "" so the action's default -D warnings is not applied to every
      # cargo invocation; -D warnings is enforced explicitly on clippy below.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-vm-main   # SHARED with the test job
          cache-on-failure: true
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: cargo doc
        run: cargo doc --workspace --no-deps

  # ---------------------------------------------------------------------------
  # MSRV: the workspace must keep compiling on the declared rust-version floor
  # (locked dep tree currently requires 1.91 via revm-state). `check` only: no
  # artifacts, no tests, just the compile floor.
  # ---------------------------------------------------------------------------
  msrv:
    name: MSRV (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.MSRV }}
          rustflags: ""
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-vm-msrv
          cache-on-failure: true
      - name: cargo check on MSRV
        run: cargo check --workspace

  # ---------------------------------------------------------------------------
  # Supply chain: advisories, license allowlist, duplicate versions, sources.
  # Config in deny.toml at the repo root.
  # ---------------------------------------------------------------------------
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------------------
  # Feature matrix: the framework gates every VM behind a cargo feature (~150
  # cfg sites), and "compiles with defaults, breaks under --features tron only"
  # is the classic regression. cargo-hack checks every single feature and every
  # depth-2 combination; --at-least-one-of skips the VM-less sets (the crate is
  # enum dispatch over the enabled VMs, so zero VMs is a documented
  # compile_error!). --no-dev-deps keeps it artifact-free.
  # ---------------------------------------------------------------------------
  features:
    name: Feature matrix (cargo hack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-vm-features
          cache-on-failure: true
      - name: Feature powerset (depth 2, at least one VM)
        run: cargo hack check -p cross-vm-framework --feature-powerset --depth 2 --at-least-one-of cw,evm,solana,tron --no-dev-deps

  # ---------------------------------------------------------------------------
  # Solana artifacts: install+cache pinned Agave v4.0.0, cargo build-sbf in the
  # ISOLATED solana-contracts workspace, upload the 3 .so. This is light: the
  # root workspace excludes examples/ and solana-contracts is its own workspace
  # (members = ["programs/*"]), so build-sbf compiles ONLY the 3 SBF programs
  # under platform-tools, never the main target. Do NOT add solana-contracts to
  # the root workspace or this job balloons.
  # ---------------------------------------------------------------------------
  solana-artifacts:
    name: Solana artifacts (build-sbf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      # Cache the Agave platform-tools install, keyed on the pinned version.
      - name: Cache Solana toolchain
        id: solana-cache
        uses: actions/cache@v6
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_VERSION }}-${{ runner.os }}
      # The SOLANA_VERSION pin (workflow env, single knob): its platform-tools
      # Cargo understands edition2024, required by a transitive dep (toml_parser)
      # in the committed solana-contracts/Cargo.lock. Older lines (v2.1.0 ships
      # Cargo 1.79) fail to parse it. Keep in step with the lock. cargo-build-sbf
      # builds the .so directly (no Anchor CLI: its version handshake silently
      # produced no .so).
      - name: Install Solana
        if: steps.solana-cache.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
      - name: Solana on PATH
        run: |
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          "$HOME/.local/share/solana/install/active_release/bin/solana" --version
      # Cache the isolated SBF workspace target + registry, keyed on its own lock.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/solana-contracts
          shared-key: solana-sbf-${{ env.SOLANA_VERSION }}
          cache-on-failure: true
      - name: cargo build-sbf
        run: make compile-solana
      - name: Verify .so exist
        run: |
          for so in counter ping_pong vault; do
            test -f "examples/solana-contracts/target/deploy/$so.so" \
              || { echo "missing $so.so after compile-solana"; exit 1; }
          done
      - name: Upload Solana artifacts
        uses: actions/upload-artifact@v7
        with:
          name: solana-so
          path: examples/solana-contracts/target/deploy/*.so
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Solidity artifacts: Foundry, forge fmt --check, forge build, upload the 3
  # .json. Very light (<1s build). --skip "*.t.sol" (in the Makefile) drops the
  # test contracts that need forge-std. No Foundry cache: prebuilt binaries fetch
  # in seconds and the build is sub-second.
  # ---------------------------------------------------------------------------
  solidity-artifacts:
    name: Solidity artifacts (forge build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: foundry-rs/foundry-toolchain@v1
      - name: forge fmt
        working-directory: examples/solidity-contracts
        run: forge fmt --check
      - name: forge build
        run: make compile-solidity
      - name: Verify JSON exist
        run: |
          for c in Counter PingPong Vault; do
            test -f "examples/solidity-contracts/out/$c.sol/$c.json" \
              || { echo "missing $c.json after compile-solidity"; exit 1; }
          done
      # Upload the whole out/ dir so the Name.sol/Name.json nesting that sol!
      # expects is preserved verbatim.
      - name: Upload Solidity artifacts
        uses: actions/upload-artifact@v7
        with:
          name: solidity-out
          path: examples/solidity-contracts/out
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Tron artifacts: Node + pnpm + tronbox (TRON's solc fork, "tronc"). Mirrors the
  # solidity-contracts src/*.sol into a gitignored generated/ (prepare-contracts.sh)
  # and compiles them to build/*.json. The 3 JSON are embedded by sol! in the
  # integration-tests support files (only the TVM creation BYTECODE is taken; the
  # ABI matches the EVM build). pnpm fetches tronbox + the tron solc binary on a
  # cold cache, so this job needs network. Upload the whole build/ dir to preserve
  # the flat Name.json layout sol! expects.
  # ---------------------------------------------------------------------------
  tron-artifacts:
    name: Tron artifacts (tronbox compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: examples/tron-contracts/pnpm-lock.yaml
      - name: tronbox compile
        run: make compile-tron
      - name: Verify JSON exist
        run: |
          for c in Counter PingPong Vault; do
            test -f "examples/tron-contracts/build/$c.json" \
              || { echo "missing $c.json after compile-tron"; exit 1; }
          done
      - name: Upload Tron artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tron-build
          path: examples/tron-contracts/build
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Test: download both contract artifacts into their EXACT embed paths, then run
  # the full test suite. The only job that compiles the full workspace for tests;
  # rust-cache (shared-key with lint) warms the dependency graph. Artifacts are
  # embedded at COMPILE time (include_bytes! for .so, sol! for .json), so a wrong
  # path fails the compile, not a test: the verify step catches that early.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [solana-artifacts, solidity-artifacts, tron-artifacts]
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-vm-main   # SHARED with the lint job
          cache-on-failure: true
      # Solana .so -> examples/solana-contracts/target/deploy/  (include_bytes!)
      - name: Download Solana artifacts
        uses: actions/download-artifact@v8
        with:
          name: solana-so
          path: examples/solana-contracts/target/deploy
      # Solidity .json -> examples/solidity-contracts/out/  (sol!, consumed by
      # both crates/solidity/tests and the integration-tests support files).
      - name: Download Solidity artifacts
        uses: actions/download-artifact@v8
        with:
          name: solidity-out
          path: examples/solidity-contracts/out
      # Tron .json -> examples/tron-contracts/build/  (sol!, consumed by the
      # integration-tests support files for the TVM creation bytecode).
      - name: Download Tron artifacts
        uses: actions/download-artifact@v8
        with:
          name: tron-build
          path: examples/tron-contracts/build
      - name: Verify embedded artifacts are in place
        run: |
          for so in counter ping_pong vault; do
            test -f "examples/solana-contracts/target/deploy/$so.so" \
              || { echo "missing $so.so"; exit 1; }
          done
          for c in Counter PingPong Vault; do
            test -f "examples/solidity-contracts/out/$c.sol/$c.json" \
              || { echo "missing $c.json"; exit 1; }
          done
          for c in Counter PingPong Vault; do
            test -f "examples/tron-contracts/build/$c.json" \
              || { echo "missing tron $c.json"; exit 1; }
          done
      # Clippy over EVERY target (tests, examples, benches): the artifact-free
      # `lint` job deliberately skips --all-targets, so the ~2k lines of test and
      # harness code are linted here, where the embedded artifacts exist. Same
      # target split as the test steps below (onchain.rs needs Docker-built wasm).
      - name: Clippy (all targets, artifact-dependent)
        run: |
          cargo clippy --workspace --exclude cross-vm-cosmwasm --all-targets -- -D warnings
          cargo clippy -p cross-vm-cosmwasm --lib --test counter --test vault --test typed_handle -- -D warnings
      # Everything except cross-vm-cosmwasm, whose tests/onchain.rs embeds a
      # compiled counter.wasm built only by the Docker CosmWasm optimizer (not in
      # CI). That is a live #[ignore] test; the cross-VM cosmwasm path is still
      # covered via in-process ContractWrapper.
      - name: Test (workspace except cosmwasm)
        run: cargo test --workspace --exclude cross-vm-cosmwasm
      # cross-vm-cosmwasm minus the wasm-embedding onchain.rs target.
      - name: Test (cosmwasm, artifact-free targets)
        run: cargo test -p cross-vm-cosmwasm --lib --test counter --test vault --test typed_handle
